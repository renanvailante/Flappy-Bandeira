<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bandeira Edition</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); font-family:Arial,sans-serif; overflow:hidden; }
  .game-container { position:relative; width:400px; height:600px; background:linear-gradient(to bottom,#4facfe 0%,#00f2fe 100%); border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden; }
  canvas { display:block; width:100%; height:100%; }
  .score { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:48px; font-weight:bold; color:white; text-shadow:3px 3px 6px rgba(0,0,0,0.5); z-index:10; }
  .start-screen, .game-over-screen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:20; }
  .game-over-screen { display:none; }
  h1 { color:#fff; font-size:36px; margin-bottom:20px; text-shadow:2px 2px 4px rgba(0,0,0,0.5); }
  .btn { padding:15px 40px; font-size:20px; background:linear-gradient(45deg,#f093fb 0%,#f5576c 100%); color:white; border:none; border-radius:50px; cursor:pointer; transition:transform 0.2s, box-shadow 0.2s; box-shadow:0 4px 15px rgba(0,0,0,0.3); }
  .btn:hover { transform:scale(1.05); box-shadow:0 6px 20px rgba(0,0,0,0.4); }
  .final-score { color:#fff; font-size:24px; margin-bottom:20px; }
  .instructions { color:#fff; font-size:16px; margin-top:20px; opacity:0.8; }
</style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  <div class="score" id="score">0</div>

  <div class="start-screen" id="startScreen">
    <h1>🎓 Flappy Bandeira Edition</h1>
    <button class="btn" onclick="startGame()">Start Game</button>
    <p class="instructions">Click or press SPACE to fly!</p>
  </div>

  <div class="game-over-screen" id="gameOverScreen">
    <h1>Game Over!</h1>
    <p class="final-score" id="finalScore">Score: 0</p>
    <button class="btn" onclick="restartGame()">Play Again</button>
  </div>
</div>

function startGame() {
  startScreen.style.display = 'none';
  gameOverScreen.style.display = 'none';
  bird.y = 300;
  bird.velocity = 0;
  pipes = [];
  frame = 0;
  score = 0;
  gameRunning = true;
  loop();
}

function restartGame() {
  startGame();
}

function loop() {
  if(!gameRunning) return;
  frame++;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Bird physics
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  // Draw bird
  ctx.drawImage(birdImg, bird.x, bird.y, bird.width, bird.height);

  // Create pipes
  if(frame % 90 === 0){
    let topHeight = Math.floor(Math.random() * (canvas.height - pipeGap - 100)) + 50;
    pipes.push({x:canvas.width, top:topHeight});
  }

  // Move pipes
  for(let i=0;i<pipes.length;i++){
    pipes[i].x -= 3;
    // Draw pipes
    ctx.fillStyle = 'green';
    ctx.fillRect(pipes[i].x,0,pipeWidth,pipes[i].top);
    ctx.fillRect(pipes[i].x,pipes[i].top + pipeGap,pipeWidth,canvas.height);
    
    // Collision detection
    if(bird.x < pipes[i].x + pipeWidth && bird.x + bird.width > pipes[i].x &&
      (bird.y < pipes[i].top || bird.y + bird.height > pipes[i].top + pipeGap)) {
        endGame();
    }

    // Update score
    if(pipes[i].x + pipeWidth === bird.x) score++;
  }

  // Draw score
  scoreElement.innerText = score;

  // Check floor and ceiling
  if(bird.y + bird.height > canvas.height || bird.y < 0) endGame();

  requestAnimationFrame(loop);
}

function endGame() {
  gameRunning = false;
  finalScoreElement.innerText = 'Score: ' + score;
  gameOverScreen.style.display = 'flex';
}

// Controls
document.addEventListener('keydown', (e) => {
  if(e.code === 'Space') bird.velocity = bird.jumpPower;
});
document.addEventListener('click', () => {
  bird.velocity = bird.jumpPower;
});
</script>
